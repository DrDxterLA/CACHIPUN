<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cachipún - Usuario vs Consola</title>

    <!-- Bootstrap CSS -->
    <link 
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" 
      rel="stylesheet"
    >
</head>
<body class="bg-light">

    <div class="container text-center mt-5">
        <h1 class="mb-4">🎮 Juego Cachipún</h1>
        <p>Elige una opción para jugar contra la consola</p>

        <!-- Botones del jugador -->
        <div class="d-flex justify-content-center gap-3 mt-4">
            <button class="btn btn-primary" onclick="jugar('piedra')">🪨 Piedra</button>
            <button class="btn btn-success" onclick="jugar('papel')">📄 Papel</button>
            <button class="btn btn-danger" onclick="jugar('tijera')">✂️ Tijera</button>
        </div>

        <!-- Resultados -->
        <div class="card mt-5">
            <div class="card-body">
                <p id="usuario" class="fw-bold"></p>
                <p id="consola" class="fw-bold"></p>
                <h4 id="resultado" class="mt-3"></h4>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script src="assets/js/script.js"></script>
</body>
</html>
